<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
  CupIT — Homepage  (index.html)
  ═══════════════════════════════════════════════════════════════

  PURPOSE:
    Single screen landing page.
      - Nav with key links
      - Headline: "Coffee Cupping, Sorted."
      - Sign up / Log in buttons
      - Link to beginner guide

  SMART AUTH:
    If already logged in, buttons swap to dashboard shortcuts.
  ═══════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2319" />
  <meta name="description" content="CupIT — Coffee cupping, sorted." />
  <title>CupIT — Coffee Cupping, Sorted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --dark:    #1a2319;
      --brown:   #2d3b2d;
      --light:   #8faa8b;
      --accent:  #c9a84c;
      --cream:   #e8e4d9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grain */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    /* Warm glow */
    .glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 50% 110%, rgba(201,168,76,0.28) 0%, transparent 60%);
    }

    /* ── NAV ── */
    nav {
      position: relative; z-index: 10;
      padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--cream); text-decoration: none;
    }
    .nav-logo em { font-style: italic; color: var(--accent); }
    .nav-links {
      display: flex; align-items: center; gap: 20px; list-style: none;
    }
    .nav-links a {
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(232,228,217,0.7); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-cta {
      background: #e8e4d9 !important;
      color: #1a2319 !important;
      padding: 7px 16px; border-radius: 30px;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: #ffffff !important; }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 0 24px 60px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      font-weight: 700; line-height: 1.1;
      color: var(--cream); letter-spacing: -0.01em;
      margin-bottom: 10px;
      animation: fadeUp 0.6s ease both; animation-delay: 0.1s;
    }
    h1 em { font-style: italic; font-weight: 400; color: var(--light); }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-style: italic; font-weight: 400;
      color: rgba(232,228,217,0.7);
      margin-bottom: 44px;
      animation: fadeUp 0.6s ease both; animation-delay: 0.15s;
    }

    .auth-buttons {
      display: flex; gap: 12px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 24px;
      animation: fadeUp 0.6s ease both; animation-delay: 0.2s;
    }
    .btn-signup {
      display: inline-flex; align-items: center; gap: 8px;
      background: #e8e4d9; color: #1a2319;
      font-family: 'DM Mono', monospace; font-size: 0.66rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 14px 30px; border-radius: 50px; text-decoration: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    .btn-signup:hover { background: #ffffff; transform: translateY(-2px); }
    .btn-login {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.07); color: var(--cream);
      font-family: 'DM Mono', monospace; font-size: 0.66rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 14px 30px; border-radius: 50px; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.2s;
    }
    .btn-login:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }

    .guide-link {
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(232,228,217,0.7); text-decoration: none;
      border-bottom: 1px solid rgba(232,228,217,0.35);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      animation: fadeUp 0.6s ease both; animation-delay: 0.25s;
    }
    .guide-link:hover { color: var(--light); border-color: var(--light); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .nav-links { display: none; }
    }
  </style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CupIT" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>

<div class="glow"></div>

<!-- ── NAV ── -->
<nav>
  <a href="#" class="nav-logo">Cup<em>IT</em></a>
  <ul class="nav-links">
    <li><a href="familiar.html">For cuppers</a></li>
    <li><a href="guide.html">Beginner's guide</a></li>
    <li><a href="login.html">Log in</a></li>
    <li><a href="signup.html" class="nav-cta">Get started</a></li>
  </ul>
</nav>

<!-- ── CONTENT ── -->
<div class="content">
  <h1>Coffee Cupping,<br><em>Sorted.</em></h1>
  <p class="tagline">Log it. Track it. Taste better.</p>

  <div class="auth-buttons">
    <a href="signup.html" class="btn-signup" id="btn-main">Get started free →</a>
    <a href="login.html" class="btn-login" id="btn-login">Log in</a>
  </div>

  <a href="guide.html" class="guide-link">New to cupping? Try the beginners guide →</a>
</div>

<script>
  track('page_view', { page: 'home' });

  // Swap buttons if already logged in
  (async () => {
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (session) {
      const main  = document.getElementById('btn-main');
      const login = document.getElementById('btn-login');
      main.textContent = 'Go to my dashboard →';
      main.href        = 'dashboard.html';
      login.textContent = 'My sessions';
      login.href        = 'history.html';
    }
  })();
</script>
</body>
</html>
