<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
  CupIT — Session History  (history.html)
  ═══════════════════════════════════════════════════════════════

  PURPOSE:
    A logged-in user's full cupping history in one place.
    Designed for density and scannability — especially useful
    for quality control (e.g. tracking a coffee across batches).

  DATA:
    Currently uses MOCK_SESSIONS[] defined in the script block.
    When the backend is ready, replace loadSessions() with a real
    API call and populate sessions[] from the response.
    Session objects must match the shape defined in MOCK_SESSIONS.

  PAGE LAYOUT:
    TOP NAV       Sticky nav with logo and account link
    HEADER        Page title, session count, "New session" button
    FILTER BAR    Search + filter controls (name, date, roaster)
    SESSION TABLE Dense table showing one row per session.
                  Columns: Date, Session Name, Coffees, Avg Score,
                  Top Flavours, Roaster. Sortable by column header.
    DRAWER        Slide-in panel from the right showing full session
                  detail when a row is tapped. Closes on overlay click
                  or the × button.

  KEY JAVASCRIPT:
    MOCK_SESSIONS[]   Sample data. Replace with API response.
    loadSessions()    Populates sessions[] — swap for real fetch here.
    renderTable()     Filters, sorts and renders the table rows.
    applyFilters()    Reads all filter inputs and returns filtered array.
    sortSessions()    Sorts the filtered array by the active column.
    openDrawer(id)    Finds session by id, builds and slides in the drawer.
    closeDrawer()     Hides the drawer and overlay.
    formatDate()      Formats ISO date strings for display.
    avgScore()        Computes average from a scores object.

  FILTER BEHAVIOUR:
    All filters are AND'd together — a session must pass every
    active filter to appear. Filters debounce 200ms on text input.

  SORTING:
    Click any column header to sort by that column.
    Click again to reverse. Active sort column is highlighted.

  FUTURE / TODO:
    - Replace MOCK_SESSIONS with real API fetch in loadSessions().
    - Add export to CSV / PDF button.
    - Add a "Compare sessions" mode — select two rows, open a
      side-by-side comparison drawer.
    - Pagination or infinite scroll for large history sets.
    - "Starred" sessions for quick access to key reference batches.
  ═══════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e8e4d9" />
  <title>Session History — CupIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --bg:      #e8e4d9;
      --paper:   #f0ede5;
      --dark:    #1a2319;
      --brown:   #2d3b2d;
      --mid:     #8faa8b;
      --light:   #8faa8b;
      --accent:  #c9a84c;
      --steam:   #e8e4d9;
      --divider: rgba(45,59,45,0.1);
      --green:   #2d3b2d;
      --r:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Grain texture overlay — consistent across all CupIT pages */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    /* ── NAV ── */
    .top-nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(250,246,238,0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--divider);
      padding: 13px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 600;
      color: var(--brown); text-decoration: none;
    }
    .nav-logo em { font-style: italic; color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); text-decoration: none; transition: color 0.2s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--brown); }
    .nav-link.active { color: var(--brown); font-weight: 500; }

    @media (max-width: 560px) {
      .nav-links { gap: 12px; }
      .nav-link { font-size: 0.5rem; letter-spacing: 0.06em; }
    }
    @media (max-width: 400px) {
      .nav-link:not(.active):not([onclick]) { display: none; }
      .nav-link[onclick] { display: block; }
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .page-header-left {}
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--brown); line-height: 1.2; margin-bottom: 4px;
    }
    .page-title em { font-style: italic; }
    .page-meta {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--light);
    }
    .btn-new-session {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--dark); color: var(--cream);
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 10px 18px; border-radius: 50px; border: none;
      cursor: pointer; transition: background 0.2s; text-decoration: none;
      white-space: nowrap;
    }
    .btn-new-session:hover { background: var(--brown); }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--paper);
    }
    .filter-input {
      padding: 8px 12px;
      background: var(--bg);
      border: 1.5px solid var(--divider);
      border-radius: var(--r);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      color: var(--dark); outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--light); font-style: italic; }
    .filter-search { flex: 1; min-width: 160px; }
    .filter-sep { color: var(--light); font-size: 0.8rem; }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 0 80px;
    }

    /* Empty state shown when no results match */
    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--mid);
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; opacity: 0.4; }
    .empty-text { font-size: 0.9rem; line-height: 1.6; }

    table {
      width: 100%; border-collapse: collapse;
      min-width: 640px;
    }
    thead {
      background: var(--paper);
      border-bottom: 2px solid var(--divider);
    }
    th {
      padding: 11px 16px;
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); font-weight: 400;
      text-align: left; cursor: pointer; user-select: none;
      white-space: nowrap; transition: color 0.2s;
    }
    th:hover { color: var(--brown); }
    th.sorted { color: var(--accent); }
    th .sort-arrow { margin-left: 4px; opacity: 0.5; font-size: 0.65rem; }
    th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--divider);
      cursor: pointer; transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(45,59,45,0.05); }
    tbody tr.selected { background: rgba(201,168,76,0.06); }

    td {
      padding: 13px 16px;
      vertical-align: middle;
      font-size: 0.85rem; color: var(--dark);
    }

    /* Date column */
    .td-date {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--brown); white-space: nowrap;
    }

    /* Session name — primary identifier */
    .td-name { font-weight: 600; color: var(--dark); }
    .td-name-sub {
      font-size: 0.72rem; color: var(--brown); margin-top: 2px;
      font-weight: 400; opacity: 0.8;
    }

    /* Coffee count badge */
    .td-coffees {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--brown);
    }


    .score-pill {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      font-weight: bold; flex-shrink: 0;
    }
    .score-pill.high   { background: rgba(74,103,65,0.2);   color: #2d4a26; }
    .score-pill.mid    { background: rgba(201,168,76,0.18);  color: #7a5e1a; }
    .score-pill.low    { background: rgba(45,59,45,0.12);   color: var(--brown); }
    .score-pill.none   { background: var(--steam);          color: var(--light); font-size: 0.6rem; }

    /* Flavour tags — compact */
    .td-flavours { max-width: 200px; }
    .flavour-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .flavour-chip {
      font-family: 'DM Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      color: #7a5e1a; white-space: nowrap;
    }
    .flavour-more {
      font-family: 'DM Mono', monospace; font-size: 0.55rem;
      color: var(--brown); white-space: nowrap; padding-top: 2px;
    }

    /* ── DRAWER ── */
    /* Dark overlay behind drawer */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(26,35,25,0.5);
      backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    /* Drawer panel slides in from the right */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 301;
      width: 100%; max-width: 480px;
      background: var(--paper);
      box-shadow: -8px 0 40px rgba(26,35,25,0.2);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--dark);
      padding: 18px 20px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
    }
    .drawer-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 600;
      color: var(--cream); line-height: 1.25;
    }
    .drawer-meta {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--light); margin-top: 4px;
    }
    .drawer-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: var(--light); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s; margin-top: 2px;
    }
    .drawer-close:hover { background: rgba(255,255,255,0.2); }

    .drawer-body { padding: 20px; flex: 1; }

    /* Collapsible guest rows */
    .guest-row {
      border: 1px solid var(--divider);
      border-radius: 12px; margin-bottom: 8px; overflow: hidden;
    }
    .guest-row-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer;
      background: var(--paper); transition: background 0.15s;
      user-select: none;
    }
    .guest-row-header:hover { background: var(--bg); }
    .guest-row-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      font-weight: 500; color: var(--brown); flex-shrink: 0;
    }
    .guest-row-name {
      font-size: 0.9rem; font-weight: 500; color: var(--brown);
      margin-left: 10px; flex: 1;
    }
    .guest-row-arrow {
      font-size: 0.65rem; color: var(--mid);
      transition: transform 0.2s;
    }
    .guest-row.open .guest-row-arrow { transform: rotate(180deg); }
    .guest-row-body {
      display: none; padding: 12px 14px;
      border-top: 1px solid var(--divider);
      background: var(--paper);
    }
    .guest-row.open .guest-row-body { display: block; }
    .guest-coffee-name {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 6px; margin-top: 10px; display: block;
    }
    .guest-coffee-name:first-child { margin-top: 0; }
    .drawer-toggle {
      display: flex; background: var(--bg);
      border-radius: 10px; padding: 3px;
      margin-bottom: 16px; gap: 0;
    }
    .drawer-toggle-btn {
      flex: 1; padding: 8px 10px;
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: none; cursor: pointer; border-radius: 8px;
      transition: all 0.2s; color: var(--mid); background: transparent;
    }
    .drawer-toggle-btn.active {
      background: var(--paper);
      color: var(--brown);
      border: 1px solid var(--divider);
    }

    /* Individual coffee card inside the drawer */
    .drawer-coffee {
      background: var(--bg);
      border: 1px solid var(--divider);
      border-radius: 14px; padding: 16px;
      margin-bottom: 12px;
    }
    .drawer-coffee-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .drawer-coffee-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 600; color: var(--brown);
    }
    .drawer-score-badge {
      background: linear-gradient(135deg, var(--accent), #c9a84c);
      color: white; font-family: 'DM Mono', monospace;
      font-size: 0.8rem; width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .drawer-row {
      display: flex; gap: 10px; margin-bottom: 8px; font-size: 0.82rem;
    }
    .drawer-key {
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--light); width: 72px; flex-shrink: 0; padding-top: 2px;
    }
    .drawer-val { color: var(--brown); }
    .drawer-val.italic { font-style: italic; color: var(--mid); }


    .drawer-score-bars { margin-top: 10px; }
    .score-bar-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .score-bar-label {
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--mid); width: 68px; flex-shrink: 0;
    }
    .score-bar-track {
      flex: 1; height: 4px; background: rgba(45,59,45,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
    }
    .score-bar-val {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      color: var(--accent); width: 24px; text-align: right; flex-shrink: 0;
    }

    .drawer-flavour-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .drawer-flavour-tag {
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2); color: var(--accent);
    }

    /* Section divider inside drawer */
    .drawer-divider {
      height: 1px; background: var(--divider); margin: 16px 0;
    }
    .drawer-section-label {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--light); margin-bottom: 12px; display: block;
    }

    /* Drawer footer actions */
    .drawer-footer {
      padding: 16px 20px 28px;
      border-top: 1px solid var(--divider);
      display: flex; gap: 10px; align-items: center;
      justify-content: space-between;
    }
    .drawer-btn {
      padding: 12px 18px;
      border-radius: var(--r); border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 0.2s; white-space: nowrap;
    }
    .drawer-btn-primary { background: var(--cream); color: var(--dark); }
    .drawer-btn-primary:hover { background: #ffffff; }
    .drawer-btn-ghost { background: transparent; border: 1.5px solid var(--divider); color: var(--mid); }
    .drawer-btn-ghost:hover { border-color: var(--brown); color: var(--brown); }
    @media (max-width: 480px) {
      .drawer-footer { flex-wrap: wrap; }
      .drawer-btn { flex: 1; text-align: center; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    tbody tr { animation: fadeUp 0.2s ease both; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CupIT" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body>

<!-- ── NAV ── -->
<nav class="top-nav">
  <a href="dashboard.html" class="nav-logo">Cup<em>IT</em></a>
  <div class="nav-links">
    <a href="cupping.html" class="nav-link">New session</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="history.html" class="nav-link active">History</a>
    <a href="account.html" class="nav-link">Account</a>
    <a href="#" class="nav-link" onclick="signOut(event)">Sign out</a>
  </div>
</nav>


<!-- ── PAGE HEADER ── -->
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">Cupping <em>history</em></h1>
    <p class="page-meta" id="session-count">Loading sessions...</p>
  </div>
  <a href="cupping.html" class="btn-new-session">+ New session</a>
</div>


<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <!-- Text search across session name and coffee names -->
  <input type="text" class="filter-input filter-search" id="filter-search"
    placeholder="Search by session, coffee, origin, variety, producer, roaster..." oninput="debouncedRender()" />

  <!-- Filter by date range -->
  <input type="date" class="filter-input" id="filter-date-from"
    title="From date" onchange="renderTable()" />
  <span class="filter-sep">—</span>
  <input type="date" class="filter-input" id="filter-date-to"
    title="To date" onchange="renderTable()" />


</div>


<!-- ── SESSION TABLE ── -->
<div class="table-wrap">
  <div class="empty-state" id="empty-state">
    <span class="empty-icon">🫘</span>
    <p class="empty-text">No sessions match your filters.<br>Try adjusting the search or date range.</p>
  </div>

  <table id="session-table">
    <thead>
      <tr>
        <!-- Each th has a data-col attribute used for sorting -->
        <th data-col="date" onclick="setSort('date')" class="sorted">
          Date <span class="sort-arrow" id="arrow-date">↓</span>
        </th>
        <th data-col="name" onclick="setSort('name')">
          Session <span class="sort-arrow" id="arrow-name"></span>
        </th>
        <th data-col="coffees" onclick="setSort('coffees')">
          Coffees <span class="sort-arrow" id="arrow-coffees"></span>
        </th>
        <th>Top flavours</th>
        <th data-col="roaster" onclick="setSort('roaster')">
          Roaster <span class="sort-arrow" id="arrow-roaster"></span>
        </th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>


<!-- ── DRAWER OVERLAY ── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- ── DETAIL DRAWER ── -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <p class="drawer-title" id="drawer-title"></p>
      <p class="drawer-meta" id="drawer-meta"></p>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="drawer-toggle" id="drawer-toggle" style="display:none">
      <button class="drawer-toggle-btn active" id="toggle-host" onclick="switchDrawerView('host')">Your notes</button>
      <button class="drawer-toggle-btn" id="toggle-guests" onclick="switchDrawerView('guests')">Guest responses</button>
    </div>
    <div id="drawer-host-content"></div>
    <div id="drawer-guest-content" style="display:none"></div>
  </div>
  <div class="drawer-footer">
    <button class="drawer-btn drawer-btn-ghost" onclick="closeDrawer()">Close</button>
    <button class="drawer-btn drawer-btn-ghost" id="btn-end-session" onclick="endSession()" style="display:none;color:#c0392b;border-color:#c0392b">End session</button>
    <button class="drawer-btn drawer-btn-ghost" id="btn-delete-session" onclick="deleteSession()">Delete</button>
  </div>
</div>


<script>
  // Track page view on load
  track('page_view', { page: 'history' });
  // Redirect to homepage if session is terminated (e.g. account deleted in another tab)
  window.supabaseClient.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.href = 'index.html';
  });


  // ══════════════════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════════════════
  let sessions     = [];      // full session array from loadSessions()
  let sortCol      = 'date';  // currently sorted column
  let sortAsc      = false;   // false = newest first (descending)
  let activeDrawerId = null;  // id of the session currently in the drawer
  let debounceTimer  = null;  // for text input debounce

  // ══════════════════════════════════════════════════════════
  //  INITIALISE
  // ══════════════════════════════════════════════════════════
  async function init() {
    // Auth protection — redirect if not logged in
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'signup.html';
      return;
    }

    track('page_view', { page: 'history' });
  // Redirect to homepage if session is terminated (e.g. account deleted in another tab)
  window.supabaseClient.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') window.location.href = 'index.html';
  });


    await loadSessions(session.user.id);
    // Default date range to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('filter-date-from').value = today;
    document.getElementById('filter-date-to').value   = today;
    renderTable();
  }

  // Fetches all sessions for the current user from Supabase.
  // Maps snake_case DB columns to the shape the rest of the page expects.
  async function loadSessions(userId) {
    const { data, error } = await window.supabaseClient
      .from('cupping_sessions')
      .select('id, session_name, session_date, coffees, params_active, timer_enabled, share_token, is_active, status, blind, scheduled_at, recurrence')
      .eq('user_id', userId)
      .neq('status', 'cancelled')
      .neq('status', 'scheduled')
      .eq('missed', false)
      .order('id', { ascending: false });

    if (error) {
      console.error('Error loading sessions:', error.message);
      sessions = [];
      return;
    }

    // Map DB rows to the shape used throughout history.html
    sessions = (data || []).map(s => ({
      id:          s.id,
      name:        s.session_name,
      date:        s.session_date,
      coffees:     s.coffees || [],
      shareToken:  s.share_token || null,
      isActive:    s.is_active,
      status:      s.status || (s.is_active ? 'active' : 'ended'),
      blind:        s.blind || false,
      scheduledAt:  s.scheduled_at || null,
      recurrence:   s.recurrence   || 'none',
    }));

    // Update session count in header
    document.getElementById('session-count').textContent =
      `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
  }

  // ══════════════════════════════════════════════════════════
  //  FILTERING
  //  All filters are AND'd — a session must pass all active
  //  filters to appear in the table.
  // ══════════════════════════════════════════════════════════
  function applyFilters() {
    const search   = document.getElementById('filter-search').value.trim().toLowerCase();
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo   = document.getElementById('filter-date-to').value;

    return sessions.filter(s => {
      // Text search: session name, coffee name, origin, variety, producer, process, roaster
      if (search) {
        const nameMatch     = s.name.toLowerCase().includes(search);
        const coffeeMatch   = s.coffees.some(c => c.name.toLowerCase().includes(search));
        const roasterMatch  = s.coffees.some(c => (c.data.roaster   || '').toLowerCase().includes(search));
        const originMatch   = s.coffees.some(c => (c.data.origin    || '').toLowerCase().includes(search));
        const varietyMatch  = s.coffees.some(c => (c.data.variety   || '').toLowerCase().includes(search));
        const producerMatch = s.coffees.some(c => (c.data.producer  || '').toLowerCase().includes(search));
        const processMatch  = s.coffees.some(c => (c.data.process   || '').toLowerCase().includes(search));
        if (!nameMatch && !coffeeMatch && !roasterMatch && !originMatch && !varietyMatch && !producerMatch && !processMatch) return false;
      }

      // Date range filter
      if (dateFrom && s.date < dateFrom) return false;
      if (dateTo   && s.date > dateTo)   return false;

      return true;
    });
  }

  // Debounced version of renderTable for text inputs
  function debouncedRender() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderTable, 200);
  }

  // ══════════════════════════════════════════════════════════
  //  SORTING
  // ══════════════════════════════════════════════════════════
  function setSort(col) {
    // Toggle direction if same column, otherwise default to descending for date
    track('history_sorted', { column: col });
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = (col === 'name' || col === 'roaster'); // alpha cols default asc
    }
    updateSortArrows();
    renderTable();
  }

  function sortSessions(arr) {
    return [...arr].sort((a, b) => {
      let av, bv;
      switch (sortCol) {
        case 'date':    av = a.date; bv = b.date; break;
        case 'name':    av = a.name.toLowerCase(); bv = b.name.toLowerCase(); break;
        case 'coffees': av = a.coffees.length; bv = b.coffees.length; break;
        case 'roaster':
          // Sort by first roaster found in the session
          av = (a.coffees[0]?.data?.roaster || '').toLowerCase();
          bv = (b.coffees[0]?.data?.roaster || '').toLowerCase();
          break;
        default: return 0;
      }
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  function updateSortArrows() {
    const cols = ['date','name','coffees','roaster'];
    cols.forEach(col => {
      const th    = document.querySelector(`th[data-col="${col}"]`);
      const arrow = document.getElementById('arrow-' + col);
      if (!th || !arrow) return;
      th.classList.toggle('sorted', col === sortCol);
      arrow.textContent = col === sortCol ? (sortAsc ? '↑' : '↓') : '';
    });
  }

  // ══════════════════════════════════════════════════════════
  //  RENDER TABLE
  //  Main render loop — filters, sorts, then builds table rows.
  // ══════════════════════════════════════════════════════════
  function renderTable() {
    const filtered = applyFilters();
    const sorted   = sortSessions(filtered);

    // Update session count in header
    document.getElementById('session-count').textContent =
      `${sorted.length} session${sorted.length !== 1 ? 's' : ''}${filtered.length < sessions.length ? ' (filtered)' : ''}`;

    // Show empty state if no results — message differs based on context
    const isEmpty = sorted.length === 0;
    const isFiltered = filtered.length < sessions.length;
    document.getElementById('empty-state').classList.toggle('show', isEmpty);
    document.getElementById('session-table').style.display = isEmpty ? 'none' : 'table';
    if (isEmpty) {
      document.querySelector('.empty-text').innerHTML = isFiltered
        ? 'No sessions match your filters.<br>Try adjusting the search or date range.'
        : 'No sessions yet.<br><a href="cupping.html" style="color:var(--accent);text-decoration:none">Start your first cupping →</a>';
    }

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = sorted.map((s, i) => {

      // Gather all flavours from all coffees in the session
      const allFlavours = [...new Set(s.coffees.flatMap(c => c.data.flavours || []))];
      const showFlavours = allFlavours.slice(0, 3);
      const extraCount   = allFlavours.length - showFlavours.length;

      // Get roasters — deduplicated
      const roasters = [...new Set(s.coffees.map(c => c.data.roaster).filter(Boolean))];

      return `<tr onclick="openDrawer(${s.id})" style="animation-delay:${i*30}ms"
               class="${activeDrawerId === s.id ? 'selected' : ''}">
        <td class="td-date">${formatDate(s.date)}</td>
        <td>
          <div class="td-name">${escHtml(s.name)}</div>
          ${s.coffees.length > 1 ? `<div class="td-name-sub">${s.coffees.map(c => escHtml(c.name)).join(', ')}</div>` : ''}
        </td>
        <td class="td-coffees">${s.coffees.length}</td>
        <td class="td-flavours">
          <div class="flavour-chips">
            ${showFlavours.map(f => `<span class="flavour-chip">${escHtml(f)}</span>`).join('')}
            ${extraCount > 0 ? `<span class="flavour-more">+${extraCount}</span>` : ''}
          </div>
        </td>
        <td style="color:var(--brown);font-size:0.8rem">${roasters.join(', ') || '—'}</td>
      </tr>`;
    }).join('');
  }

  // ══════════════════════════════════════════════════════════
  //  DRAWER
  //  Slides in from the right to show full session detail.
  // ══════════════════════════════════════════════════════════
  async function openDrawer(id) {
    const session = sessions.find(s => s.id === id);
    if (!session) return;

    activeDrawerId = id;

    track('session_detail_opened', {
      session_id: id,
      coffee_count: session.coffees.length,
    });

    // Highlight selected row
    document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
    event.currentTarget.classList.add('selected');

    // Populate drawer header
    document.getElementById('drawer-title').textContent = session.name;
    document.getElementById('drawer-meta').textContent  =
      `${formatDate(session.date)} · ${session.coffees.length} coffee${session.coffees.length > 1 ? 's' : ''} · ${statusBadge(session.status)}${session.scheduledAt ? ' · 🕐 ' + formatScheduled(session.scheduledAt) : ''}${session.recurrence && session.recurrence !== 'none' ? ' · 🔁 ' + session.recurrence : ''}`;

    // Show End session button only for active sessions with a share token
    const endBtn = document.getElementById('btn-end-session');
    endBtn.style.display = (session.status === 'active' && session.shareToken) ? 'inline-flex' : 'none';

    // Build drawer body — host's coffees first
    let html = `<span style="font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);display:block;margin-bottom:14px">Your notes</span>`;

    session.coffees.forEach((c, i) => {
      const d      = c.data;
      html += `<div class="drawer-coffee">
        <div class="drawer-coffee-header">
          <span class="drawer-coffee-name">${escHtml(c.name)}</span>
        </div>`;

      if (d.origin)  html += drawerRow('Origin',  d.origin);
      if (d.roaster) html += drawerRow('Roaster', d.roaster);
      if (d.process) html += drawerRow('Process', d.process);
      if (d.roast)   html += drawerRow('Roast',   d.roast);
      if (d.brew)    html += drawerRow('Method',  d.brew);

      if (d.flavours?.length) {
        html += `<div class="drawer-divider"></div>
          <span class="drawer-section-label">Flavour notes</span>
          <div class="drawer-flavour-tags">
            ${d.flavours.map(f => `<span class="drawer-flavour-tag">${escHtml(f)}</span>`).join('')}
          </div>`;
      }

      if (d.notes) {
        html += `<div class="drawer-divider"></div>
          <span class="drawer-section-label">Tasting notes</span>
          <p style="font-size:0.85rem;color:var(--mid);font-style:italic;line-height:1.65">${escHtml(d.notes)}</p>`;
      }

      html += `</div>`;
    });

    document.getElementById('drawer-host-content').innerHTML = html;
    document.getElementById('drawer-guest-content').innerHTML = '<p style="font-size:0.85rem;color:var(--mid);padding:8px 0">Loading guest responses...</p>';

    // Reset toggle to host view
    document.getElementById('drawer-toggle').style.display = 'none';
    switchDrawerView('host');

    // Open drawer immediately
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');

    // Fetch guest responses in the background
    if (session.shareToken) {
      try {
        const { data: responses, error } = await window.supabaseClient
          .from('session_responses')
          .select('guest_name, coffees, created_at')
          .eq('share_token', session.shareToken)
          .order('created_at', { ascending: true });

        const count = (responses || []).length;
        document.getElementById('toggle-guests').textContent = `Guest responses (${count})`;
        document.getElementById('drawer-toggle').style.display = 'flex';

        if (!error && count > 0) {
          let guestHtml = '';
          responses.forEach((r, idx) => {
            const initials = r.guest_name.trim().split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
            let bodyHtml = '';
            r.coffees.forEach(c => {
              const d = c.data || {};
              bodyHtml += `<span class="guest-coffee-name">${escHtml(c.name)}</span>`;
              if (d.flavours?.length) {
                bodyHtml += `<div class="drawer-flavour-tags" style="margin-bottom:6px">${d.flavours.map(f=>`<span class="drawer-flavour-tag">${escHtml(f)}</span>`).join('')}</div>`;
              }
              if (d.notes) {
                bodyHtml += `<p style="font-size:0.82rem;color:var(--mid);font-style:italic;line-height:1.6;margin-top:4px">${escHtml(d.notes)}</p>`;
              }
              if (!d.flavours?.length && !d.notes) {
                bodyHtml += `<p style="font-size:0.82rem;color:var(--mid);">No notes recorded.</p>`;
              }
            });
            guestHtml += `
              <div class="guest-row" id="guest-row-${idx}">
                <div class="guest-row-header" onclick="toggleGuestRow(${idx})">
                  <div class="guest-row-avatar">${escHtml(initials)}</div>
                  <span class="guest-row-name">${escHtml(r.guest_name)}</span>
                  <span class="guest-row-arrow">▼</span>
                </div>
                <div class="guest-row-body">${bodyHtml}</div>
              </div>`;
          });
          document.getElementById('drawer-guest-content').innerHTML = guestHtml;
        } else {
          document.getElementById('drawer-guest-content').innerHTML = '<p style="font-size:0.85rem;color:var(--mid);padding:8px 0">No guest responses yet.</p>';
        }
      } catch(e) {
        console.error('Error fetching guest responses:', e.message);
      }
    }
  }

  function toggleGuestRow(idx) {
    document.getElementById(`guest-row-${idx}`).classList.toggle('open');
  }

  function switchDrawerView(view) {
    document.getElementById('drawer-host-content').style.display = view === 'host' ? 'block' : 'none';
    document.getElementById('drawer-guest-content').style.display = view === 'guests' ? 'block' : 'none';
    document.getElementById('toggle-host').classList.toggle('active', view === 'host');
    document.getElementById('toggle-guests').classList.toggle('active', view === 'guests');
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
    // Reset delete button state
    clearTimeout(deleteArmTimer);
    deleteArmed = false;
    const btn = document.getElementById('btn-delete-session');
    btn.textContent = 'Delete';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.disabled = false;
    setTimeout(() => {
      document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
      activeDrawerId = null;
    }, 350);
  }

  // Formats a scheduled_at ISO string to a readable date/time
  function formatScheduled(iso) {
    const d = new Date(iso);
    const dateStr = d.toLocaleDateString('en-IE', { day:'numeric', month:'short' });
    const hasTime = d.getHours() !== 0 || d.getMinutes() !== 0;
    return hasTime ? dateStr + ' ' + d.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit' }) : dateStr;
  }

  // Returns a readable status badge string
  function statusBadge(status) {
    switch(status) {
      case 'scheduled': return '🕐 Scheduled';
      case 'active':    return '🟢 Live';
      case 'ended':     return 'Ended';
      case 'cancelled': return 'Cancelled';
      default:          return '';
    }
  }

  // Closes the session — sets status = ended so guests can no longer submit
  async function endSession() {
    const session = sessions.find(s => s.id === activeDrawerId);
    if (!session || !session.shareToken) return;

    if (!confirm('End this session? Guests will no longer be able to submit responses.')) return;

    const { error } = await window.supabaseClient
      .from('cupping_sessions')
      .update({ is_active: false, status: 'ended' })
      .eq('id', activeDrawerId);

    if (error) {
      console.error('Error ending session:', error.message);
      alert('Something went wrong. Please try again.');
      return;
    }

    // Update local state
    session.isActive = false;
    session.status   = 'ended';

    // Update drawer meta and hide End session button
    document.getElementById('drawer-meta').textContent =
      `${formatDate(session.date)} · ${session.coffees.length} coffee${session.coffees.length > 1 ? 's' : ''}`;
    document.getElementById('btn-end-session').style.display = 'none';
  }

  // Placeholder — will navigate to cupping.html pre-populated
  // Two-tap delete — first tap arms the button, second tap executes deletion
  let deleteArmed = false;
  let deleteArmTimer = null;

  function deleteSession() {
    const btn = document.getElementById('btn-delete-session');

    if (!deleteArmed) {
      // First tap — arm it
      deleteArmed = true;
      btn.textContent = 'Tap again to confirm';
      btn.style.color = '#c0392b';
      btn.style.borderColor = '#c0392b';

      // Auto-disarm after 3 seconds if not confirmed
      deleteArmTimer = setTimeout(() => {
        deleteArmed = false;
        btn.textContent = 'Delete';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 3000);

    } else {
      // Second tap — execute deletion
      clearTimeout(deleteArmTimer);
      deleteArmed = false;
      confirmDeleteSession();
    }
  }

  async function confirmDeleteSession() {
    const btn = document.getElementById('btn-delete-session');
    btn.disabled = true;
    btn.textContent = 'Deleting...';

    const { error } = await window.supabaseClient
      .from('cupping_sessions')
      .delete()
      .eq('id', activeDrawerId);

    if (error) {
      console.error('Delete error:', error.message);
      btn.disabled = false;
      btn.textContent = 'Delete';
      return;
    }

    // Remove from local state and re-render
    sessions = sessions.filter(s => s.id !== activeDrawerId);
    document.getElementById('session-count').textContent =
      `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
    closeDrawer();
    renderTable();
  }

  function reopenSession() {
    alert('Re-cupping will be available once sessions are saved to your account.');
  }

  // Builds a single key/value row for the drawer
  function drawerRow(key, val) {
    return `<div class="drawer-row">
      <span class="drawer-key">${key}</span>
      <span class="drawer-val">${escHtml(val)}</span>
    </div>`;
  }

  // ══════════════════════════════════════════════════════════
  //  UTILITIES
  // ══════════════════════════════════════════════════════════



  // Formats an ISO date string (YYYY-MM-DD) for display.
  function formatDate(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-IE', {
      day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  // Prevents XSS when inserting user data into innerHTML.
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close drawer on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  // Signs the user out and redirects to homepage
  async function signOut(e) {
    e.preventDefault();
    await window.supabaseClient.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
