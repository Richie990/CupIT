<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
  CupIT — New Password  (newpassword.html)
  ═══════════════════════════════════════════════════════════════

  PURPOSE:
    User lands here after clicking the reset link in their email.
    Supabase automatically sets a session from the URL hash.
    User enters and confirms their new password.
    On success, redirects to dashboard.html.
  ═══════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2319" />
  <title>New Password — CupIT</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CupIT" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --bg:      #e8e4d9;
      --paper:   #f0ede5;
      --dark:    #1a2319;
      --brown:   #2d3b2d;
      --mid:     #8faa8b;
      --light:   #8faa8b;
      --accent:  #c9a84c;
      --cream:   #e8e4d9;
      --divider: rgba(45,59,45,0.12);
      --r:       14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    nav {
      background: var(--dark);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; color: var(--light); text-decoration: none;
    }
    .nav-logo em { font-style: italic; color: var(--accent); }

    .page-header {
      background: var(--dark);
      padding: 40px 24px 52px;
      text-align: center; position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 120%, rgba(201,168,76,0.25) 0%, transparent 65%);
    }
    .page-header-content { position: relative; z-index: 1; }
    .page-header-tag {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 12px; display: block;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 400; color: var(--cream); line-height: 1.2;
    }
    .page-header h1 em { font-style: italic; color: var(--light); }
    .page-header-sub {
      font-size: 0.9rem; color: rgba(232,228,217,0.7);
      margin-top: 8px; font-weight: 300;
    }

    .form-container {
      flex: 1; padding: 40px 20px 80px;
      display: flex; align-items: flex-start; justify-content: center;
    }
    .form-card {
      background: var(--paper);
      border: 1px solid var(--divider);
      border-radius: 20px; padding: 32px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 32px rgba(45,59,45,0.08);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 7px;
    }
    .password-wrap { position: relative; }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg);
      border: 1.5px solid var(--divider);
      border-radius: var(--r);
      font-family: 'DM Sans', sans-serif; font-size: 1rem;
      color: var(--dark); outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input.error { border-color: #c0392b; }
    .form-error {
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #c0392b; margin-top: 5px; display: none;
    }
    .form-error.show { display: block; }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--light); background: none; border: none;
      cursor: pointer; transition: color 0.2s; padding: 4px;
    }
    .toggle-pw:hover { color: var(--mid); }

    /* Password strength indicator */
    .strength-bar-wrap { height: 3px; background: var(--divider); border-radius: 2px; margin-top: 8px; }
    .strength-bar { height: 100%; border-radius: 2px; width: 0%; transition: all 0.3s; }
    .strength-label {
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-top: 4px; display: block;
    }

    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--cream); color: var(--dark);
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 50px; cursor: pointer;
      transition: all 0.2s; margin-top: 4px;
    }
    .btn-submit:hover { background: #ffffff; }
    .btn-submit:disabled { opacity: 0.45; pointer-events: none; }

    .form-global-error {
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #c0392b; text-align: center; margin-top: 14px; min-height: 18px;
    }

    /* Invalid link state */
    .invalid-state {
      display: none; text-align: center; padding: 16px 0;
    }
    .invalid-icon { font-size: 2.4rem; margin-bottom: 14px; display: block; }
    .invalid-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--brown); margin-bottom: 8px;
    }
    .invalid-body { font-size: 0.88rem; color: var(--mid); line-height: 1.65; margin-bottom: 20px; }
    .btn-back {
      display: inline-block;
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 12px 24px; border-radius: 50px; text-decoration: none;
      background: var(--cream); color: var(--dark); transition: background 0.2s;
    }
    .btn-back:hover { background: #ffffff; }

    footer {
      background: var(--dark); padding: 28px 24px; text-align: center;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 24px; list-style: none; flex-wrap: wrap;
    }
    .footer-links a {
      font-family: 'DM Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(232,228,217,0.7); text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--light); }
  </style>
  <meta name="robots" content="noindex, nofollow" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Cup<em>IT</em></a>
</nav>

<div class="page-header">
  <div class="page-header-content">
    <span class="page-header-tag">Account</span>
    <h1>Set a new <em>password</em></h1>
    <p class="page-header-sub">Choose something you'll remember.</p>
  </div>
</div>

<div class="form-container">
  <div class="form-card">

    <!-- Invalid / expired link state -->
    <div class="invalid-state" id="invalid-state">
      <span class="invalid-icon">⚠️</span>
      <h2 class="invalid-title">Link expired or invalid</h2>
      <p class="invalid-body">This password reset link has expired or already been used. Request a new one and try again.</p>
      <a href="reset.html" class="btn-back">Request a new link →</a>
    </div>

    <!-- Password form -->
    <div id="pw-form">
      <div class="form-group">
        <label class="form-label" for="pw-password">New password</label>
        <div class="password-wrap">
          <input type="password" id="pw-password" class="form-input"
            placeholder="At least 8 characters"
            oninput="checkStrength(this.value)" autocomplete="new-password" />
          <button class="toggle-pw" type="button" onclick="togglePassword('pw-password', this)">Show</button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
        <span class="strength-label" id="strength-label"></span>
        <p class="form-error" id="pw-error">Password must be at least 8 characters</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="pw-confirm">Confirm new password</label>
        <div class="password-wrap">
          <input type="password" id="pw-confirm" class="form-input"
            placeholder="Same again" autocomplete="new-password" />
          <button class="toggle-pw" type="button" onclick="togglePassword('pw-confirm', this)">Show</button>
        </div>
        <p class="form-error" id="confirm-error">Passwords do not match</p>
      </div>

      <button class="btn-submit" onclick="submitNewPassword()">Set new password →</button>
      <p class="form-global-error" id="form-global-error"></p>
    </div>

  </div>
</div>

<footer>
  <ul class="footer-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html">Log in</a></li>
  </ul>
</footer>

<script>
  // On load, check Supabase has set a valid session from the URL hash
  // If not, show the invalid link state
  (async () => {
    try {
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (!session) {
        document.getElementById('pw-form').style.display = 'none';
        document.getElementById('invalid-state').style.display = 'block';
      }
    } catch(e) {
      document.getElementById('pw-form').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    }
  })();

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.textContent = show ? 'Hide' : 'Show';
  }

  function checkStrength(pw) {
    const bar   = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { w: '20%', bg: '#c0392b', t: 'Too weak' },
      { w: '40%', bg: '#e67e22', t: 'Weak' },
      { w: '60%', bg: '#f1c40f', t: 'Fair' },
      { w: '80%', bg: '#8ec98e', t: 'Good' },
      { w: '100%', bg: '#4a6741', t: 'Strong' },
    ];
    const l = levels[Math.min(score, 4)];
    bar.style.width = pw.length ? l.w : '0%';
    bar.style.background = l.bg;
    label.textContent = pw.length ? l.t : '';
    label.style.color = l.bg;
  }

  function setLoading(loading) {
    const btn = document.querySelector('.btn-submit');
    btn.disabled = loading;
    if (loading) btn.textContent = 'Please wait...';
  }

  async function submitNewPassword() {
    const pw      = document.getElementById('pw-password');
    const conf    = document.getElementById('pw-confirm');
    const globalError = document.getElementById('form-global-error');
    globalError.textContent = '';
    let valid = true;

    if (pw.value.length < 8) {
      pw.classList.add('error');
      document.getElementById('pw-error').classList.add('show');
      valid = false;
    } else {
      pw.classList.remove('error');
      document.getElementById('pw-error').classList.remove('show');
    }

    if (pw.value !== conf.value || !conf.value) {
      conf.classList.add('error');
      document.getElementById('confirm-error').classList.add('show');
      valid = false;
    } else {
      conf.classList.remove('error');
      document.getElementById('confirm-error').classList.remove('show');
    }

    if (!valid) return;

    setLoading(true);

    try {
      const { error } = await window.supabaseClient.auth.updateUser({
        password: pw.value
      });

      if (error) {
        globalError.textContent = error.message;
        setLoading(false);
        return;
      }

      // Success — redirect to dashboard
      window.location.href = 'dashboard.html';

    } catch(e) {
      globalError.textContent = 'Something went wrong. Please try again.';
      console.error(e);
      setLoading(false);
    }
  }
</script>
</body>
</html>
